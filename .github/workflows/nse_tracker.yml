name: NSE Delivery Data Tracker

on:
  schedule:
    - cron: '50 3 * * 1-5'   # 9:20 IST  (IST = UTC+5:30)
    - cron: '50 4 * * 1-5'   # 10:20 IST
    - cron: '50 5 * * 1-5'   # 11:20 IST
    - cron: '50 6 * * 1-5'   # 12:20 IST
    - cron: '50 7 * * 1-5'   # 13:20 IST
    - cron: '50 8 * * 1-5'   # 14:20 IST
    - cron: '50 9 * * 1-5'   # 15:20 IST

  workflow_dispatch:  # manual trigger

jobs:
  fetch-nse-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NSE tracker
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
        run: python nse_to_gsheets.py
