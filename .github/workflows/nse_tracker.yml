# .github/workflows/nse_tracker.yml
#
# HOW TO USE:
#   1. Put this file at: .github/workflows/nse_tracker.yml  in your repo
#   2. Put nse_to_gsheets.py and requirements.txt at root of repo
#   3. Add these two GitHub Secrets (Settings → Secrets → Actions):
#        GOOGLE_CREDENTIALS_JSON  = paste entire contents of service account .json key
#        GOOGLE_SHEET_ID          = the ID from your Google Sheet URL
#   4. Push to GitHub — it will start running automatically!

name: NSE Delivery Data Tracker

on:
  schedule:
    - cron: '50 3 * * 1-5'   # 9:20 IST  (IST = UTC+5:30, so 9:20 IST = 3:50 UTC)
    - cron: '50 4 * * 1-5'   # 10:20 IST
    - cron: '50 5 * * 1-5'   # 11:20 IST
    - cron: '50 6 * * 1-5'   # 12:20 IST
    - cron: '50 7 * * 1-5'   # 13:20 IST
    - cron: '50 8 * * 1-5'   # 14:20 IST
    - cron: '50 9 * * 1-5'   # 15:20 IST
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  fetch-nse-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NSE tracker
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
        run: python nse_to_gsheets.py
